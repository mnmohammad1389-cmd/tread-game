<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>آرنا تریدر | پلتفرم حرفه‌ای معاملاتی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, system-ui, sans-serif;
        }

        body {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #e2e8f0;
            --border-color: #334155;
            --input-bg: #0f172a;
            --nav-bg: #1e293b;
            --stat-bg: #1e293b;
            --profit-color: #34d399;
            --loss-color: #f87171;
            --pro-glow: rgba(255, 215, 0, 0.2);
            background: var(--bg-color);
            color: var(--text-color);
        }

        .pro-account {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            box-shadow: 0 0 20px var(--pro-glow);
            position: relative;
            overflow: hidden;
        }
        
        .pro-account::before {
            content: '⭐';
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 3rem;
            opacity: 0.3;
            transform: rotate(15deg);
        }
        
        .pro-account::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: proShine 3s infinite;
        }
        
        @keyframes proShine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }
        
        .pro-badge {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #1a1a2e;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-block;
            margin-right: 10px;
            animation: proPulse 2s infinite;
        }
        
        @keyframes proPulse {
            0%, 100% { box-shadow: 0 0 5px rgba(255,215,0,0.5); }
            50% { box-shadow: 0 0 20px rgba(255,215,0,0.8); }
        }
        
        .pro-plan-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,165,0,0.1));
            border: 2px solid #FFD700;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        
        .pro-plan-card:hover {
            transform: translateY(-5px);
        }
        
        .pro-plan-price {
            font-size: 1.8rem;
            font-weight: bold;
            color: #FFD700;
        }
        
        .pro-feature {
            color: #10b981;
            margin: 5px 0;
        }

        /* ========== صفحه لاگین جدید سه‌بعدی ========== */
        .login-page {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .login-page::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at center, rgba(102, 126, 234, 0.08) 0%, transparent 70%);
            animation: bgPulse 8s ease-in-out infinite;
        }
        
        @keyframes bgPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
        }
        
        .login-container {
            max-width: 480px;
            width: 100%;
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 45px 35px;
            box-shadow: 
                0 30px 60px -15px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: perspective(1000px) rotateX(3deg);
            position: relative;
            z-index: 1;
        }
        
        .login-container:hover {
            transform: perspective(1000px) rotateX(0deg) translateY(-8px);
            box-shadow: 
                0 40px 80px -20px rgba(0, 0, 0, 0.8),
                0 0 60px rgba(102, 126, 234, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }
        
        .logo-area {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
        }
        
        .logo-icon {
            font-size: 4.5rem;
            margin-bottom: 10px;
            display: inline-block;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 8px 30px rgba(255, 215, 0, 0.15));
            animation: floatIcon 4s ease-in-out infinite;
        }
        
        @keyframes floatIcon {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(3deg); }
        }
        
        .logo-icon:hover {
            transform: scale(1.15) rotate(8deg);
        }
        
        .logo-area h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FFD700);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: goldShine 3s ease-in-out infinite;
            letter-spacing: 2px;
        }
        
        @keyframes goldShine {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .logo-area p {
            color: rgba(226, 232, 240, 0.6);
            font-size: 0.9rem;
            margin-top: 6px;
            letter-spacing: 3px;
            font-weight: 300;
        }
        
        .logo-area .subtitle-line {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #FFD700, transparent);
            margin: 10px auto 0;
            border-radius: 2px;
        }
        
        .form-group {
            margin-bottom: 22px;
            position: relative;
        }
        
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: rgba(226, 232, 240, 0.7);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        
        .form-group input {
            width: 100%;
            padding: 16px 18px;
            border: 1.5px solid rgba(51, 65, 85, 0.6);
            border-radius: 20px;
            font-size: 0.95rem;
            outline: none;
            background: rgba(15, 23, 42, 0.6);
            color: #e2e8f0;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .form-group input:focus {
            border-color: #FFD700;
            box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.08), 0 0 30px rgba(255, 215, 0, 0.03);
            transform: scale(1.01);
            background: rgba(15, 23, 42, 0.8);
        }
        
        .form-group input::placeholder {
            color: rgba(148, 163, 184, 0.4);
        }
        
        .form-group input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px rgba(15, 23, 42, 0.8) inset !important;
            -webkit-text-fill-color: #e2e8f0 !important;
        }
        
        .checkbox-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            font-size: 0.85rem;
            color: rgba(226, 232, 240, 0.6);
        }
        
        .checkbox-group input[type="checkbox"] {
            accent-color: #FFD700;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .forgot-link, .switch-link {
            color: #FFD700;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            position: relative;
        }
        
        .forgot-link::after, .switch-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            right: 0;
            width: 0;
            height: 1px;
            background: #FFD700;
            transition: width 0.3s ease;
        }
        
        .forgot-link:hover::after, .switch-link:hover::after {
            width: 100%;
        }
        
        .forgot-link:hover, .switch-link:hover {
            color: #FFE44D;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.15);
        }
        
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #FFD700, #F59E0B);
            border: none;
            border-radius: 20px;
            color: #0f172a;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.15);
        }
        
        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.6s ease;
        }
        
        .btn-submit:hover::before {
            left: 100%;
        }
        
        .btn-submit:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 12px 40px rgba(255, 215, 0, 0.25);
        }
        
        .btn-submit:active {
            transform: translateY(1px) scale(0.98);
        }
        
        .switch-tab {
            text-align: center;
            margin-top: 25px;
            padding-top: 22px;
            border-top: 1px solid rgba(51, 65, 85, 0.3);
            color: rgba(226, 232, 240, 0.5);
            font-size: 0.9rem;
        }
        
        .form-hidden {
            display: none;
        }
        
        .error-msg {
            color: #f87171;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 12px;
            padding: 8px;
            background: rgba(248, 113, 113, 0.08);
            border-radius: 12px;
            border: 1px solid rgba(248, 113, 113, 0.1);
        }
        
        .success-msg {
            color: #34d399;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 12px;
            padding: 8px;
            background: rgba(52, 211, 153, 0.08);
            border-radius: 12px;
            border: 1px solid rgba(52, 211, 153, 0.1);
        }
        
        .game-page { background: var(--bg-color); min-height: 100vh; padding: 20px; display: none; }
        .app-container { max-width: 1600px; margin: 0 auto; }
        .admin-header { background: var(--card-bg); border-radius: 28px; padding: 16px 24px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; border: 1px solid var(--border-color); }
        .user-title { font-size: 1.3rem; font-weight: 700; }
        .ref-box { background: var(--input-bg); padding: 8px 16px; border-radius: 40px; font-size: 0.9rem; border: 1px solid var(--border-color); }
        .logout-btn { background: #eef2ff; border: none; padding: 8px 20px; border-radius: 32px; cursor: pointer; color: #1a2c3e; }
        .nav-tabs { display: flex; flex-wrap: wrap; gap: 8px; background: var(--nav-bg); padding: 10px 16px; border-radius: 50px; margin-bottom: 24px; border: 1px solid var(--border-color); }
        .nav-btn { background: transparent; border: none; padding: 8px 18px; border-radius: 40px; font-weight: 600; cursor: pointer; color: var(--text-color); font-size: 0.85rem; }
        .nav-btn.active { background: #1e3a5f; color: white; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 15px; margin-bottom: 24px; }
        .stat-card { background: var(--stat-bg); border-radius: 24px; padding: 14px 16px; border: 1px solid var(--border-color); }
        .stat-value { font-size: 1.4rem; font-weight: 800; }
        .stat-label { font-size: 0.7rem; opacity: 0.7; }
        .search-box { width: 100%; padding: 12px 18px; border-radius: 50px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-color); margin-bottom: 20px; outline: none; }
        .assets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; margin-bottom: 30px; }
        .coin-card { background: var(--card-bg); border-radius: 28px; padding: 16px; border: 1px solid var(--border-color); }
        .coin-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .coin-info { display: flex; align-items: center; gap: 12px; }
        .coin-icon { width: 45px; height: 45px; background: var(--input-bg); border-radius: 100px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; overflow: hidden; border: 1px solid var(--border-color); }
        .coin-icon img { width: 100%; height: 100%; object-fit: cover; }
        .coin-price { font-weight: 800; font-size: 1.1rem; }
        .signal-badge { font-size: 0.65rem; padding: 4px 10px; border-radius: 20px; display: inline-block; margin-left: 8px; }
        .signal-strong-buy { background: #10b981; color: white; }
        .signal-buy { background: #34d399; color: #064e3b; }
        .signal-strong-sell { background: #ef4444; color: white; }
        .signal-sell { background: #f87171; color: #7f1d1d; }
        .signal-neutral { background: #6b7280; color: white; }
        .trade-flex { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; }
        .amount-input { flex: 2; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 40px; padding: 8px 10px; text-align: center; color: var(--text-color); }
        .btn-buy { background: #10b981; color: white; border: none; padding: 8px 14px; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .btn-sell { background: #ef4444; color: white; border: none; padding: 8px 14px; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .max-btn { background: var(--input-bg); border: 1px solid var(--border-color); padding: 8px 12px; border-radius: 40px; font-weight: 500; cursor: pointer; color: var(--text-color); }
        .holding-text { font-size: 0.7rem; background: var(--input-bg); padding: 8px; border-radius: 20px; text-align: center; margin-top: 8px; border: 1px solid var(--border-color); }
        .panel-card { background: var(--card-bg); border-radius: 28px; padding: 18px; margin-bottom: 18px; border: 1px solid var(--border-color); }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .admin-table th, .admin-table td { padding: 8px 4px; border-bottom: 1px solid var(--border-color); text-align: center; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        .log-panel { background: var(--card-bg); border-radius: 28px; padding: 14px; margin-top: 20px; }
        .log-scroll { height: 140px; overflow-y: auto; font-size: 0.7rem; background: var(--input-bg); border-radius: 18px; padding: 6px; }
        .log-line { padding: 5px 10px; border-bottom: 1px solid var(--border-color); }
        .admin-input { background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 5px 6px; width: 80px; text-align: center; color: var(--text-color); }
        footer { text-align: center; margin-top: 25px; opacity: 0.7; font-size: 0.7rem; }
        .setting-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 15px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color); }
        .setting-label { font-weight: 600; min-width: 130px; }
        .asset-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--input-bg); border-radius: 20px; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; border: 1px solid var(--border-color); }
        .asset-sell-btn { background: #ef4444; color: white; border: none; padding: 4px 12px; border-radius: 20px; cursor: pointer; font-size: 0.7rem; }
        .leverage-item { background: var(--input-bg); border-radius: 20px; padding: 10px; margin-bottom: 8px; border: 1px solid var(--border-color); }
        .close-pos-btn { background: #ef4444; color: white; border: none; padding: 4px 12px; border-radius: 20px; cursor: pointer; font-size: 0.7rem; }
        .task-item { background: var(--input-bg); border-radius: 16px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; border: 1px solid var(--border-color); }
        .task-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 12px; background: #334155; color: white; }
        .task-completed { background: #10b981; }
        .coin-edit-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
        .custom-coin-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: var(--input-bg); border-radius: 16px; margin-bottom: 8px; border: 1px solid var(--border-color); }
        .profit-percent { font-size: 0.7rem; font-weight: 600; }
        .btn-small { padding: 4px 10px; font-size: 0.7rem; border-radius: 16px; }
        .user-card { background: var(--input-bg); border-radius: 16px; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border-color); }
        .user-info { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
        .asset-control { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-color); }
        .pro-plans-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 15px; }
        .fund-box { background: var(--card-bg); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border-color); }
        .fund-upgrade-btn { background: #3b82f6; color: white; border: none; padding: 5px 10px; border-radius: 20px; cursor: pointer; font-size: 0.7rem; }

        /* استایل‌های بخش شرط‌بندی */
        .bet-card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        .bet-card h3 {
            margin-bottom: 15px;
            font-size: 1.2rem;
        }
        .bet-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
        }
        .bet-option-btn {
            background: var(--input-bg);
            border: 2px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 16px;
            cursor: pointer;
            color: var(--text-color);
            font-weight: 600;
            transition: all 0.3s ease;
            min-width: 60px;
        }
        .bet-option-btn:hover {
            border-color: #667eea;
            transform: scale(1.05);
        }
        .bet-option-btn.selected {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.2);
        }
        .dice-result {
            font-size: 5rem;
            text-align: center;
            padding: 30px;
            margin: 10px 0;
            background: var(--input-bg);
            border-radius: 20px;
            border: 2px solid var(--border-color);
            transition: all 0.3s ease;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dice-result.spinning {
            animation: diceSpin 0.5s ease-in-out;
        }
        @keyframes diceSpin {
            0% { transform: rotate(0deg) scale(0.5); opacity: 0.3; }
            25% { transform: rotate(90deg) scale(1.2); }
            50% { transform: rotate(180deg) scale(0.8); opacity: 0.7; }
            75% { transform: rotate(270deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); opacity: 1; }
        }
        .slot-machine {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 30px 20px;
            margin: 10px 0;
            background: var(--input-bg);
            border-radius: 20px;
            border: 2px solid var(--border-color);
            min-height: 150px;
            align-items: center;
            flex-wrap: wrap;
        }
        .slot-reel {
            font-size: 4.5rem;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-color);
            border-radius: 16px;
            border: 3px solid var(--border-color);
            transition: all 0.3s ease;
            font-weight: bold;
        }
        .slot-reel.spinning {
            animation: slotSpin 0.3s ease-in-out;
        }
        @keyframes slotSpin {
            0% { transform: scale(0.7) rotate(-20deg); opacity: 0.3; }
            50% { transform: scale(1.3) rotate(10deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .slot-sum {
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            padding: 15px;
            margin-top: 10px;
            background: var(--input-bg);
            border-radius: 16px;
            border: 2px solid var(--border-color);
            transition: all 0.5s ease;
        }
        .slot-sum.hidden-sum {
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
            height: 0;
            padding: 0;
            margin: 0;
            border: none;
            overflow: hidden;
        }
        .slot-sum.visible-sum {
            opacity: 1;
            transform: translateY(0);
            height: auto;
            padding: 15px;
            margin-top: 10px;
            border: 2px solid var(--border-color);
        }
        .bet-result {
            font-size: 1.1rem;
            font-weight: 700;
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            margin-top: 10px;
        }
        .bet-result.win {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid #10b981;
        }
        .bet-result.lose {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid #f87171;
        }
        .bet-result.draw {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
            border: 1px solid #fbbf24;
        }
        .bet-history {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .bet-history-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 12px;
            border-bottom: 1px solid var(--border-color);

        function getUserFeeRate(user) {

                return 0;

            let volume = user.monthlyVolume || 0;
            let levels = globalSettings.feeLevels;
            let selected = levels[0];
            for (let i = levels.length-1; i >= 0; i--) {
                if (volume >= levels[i].minVolume) { selected = levels[i]; break; }
            }
            return selected.fee;
        }

            if (user.isPro && user.proExpiry && new Date(user.proExpiry) > new Date()) {

            let profit = total - initialBalance;

            if (dollarAmount <= 0) { addLog("مقدار نامعتبر", false); return; }
            let feeRate = getUserFeeRate(currentUser);
            let fee = dollarAmount * (feeRate / 100);
            let total = dollarAmount + fee;
            if (currentUser.balance < total) { addLog("موجودی کافی نیست", false); return; }
            
            let qty = dollarAmount / prices[sym];
            let oldHold = currentUser.holdings?.[sym] || 0;
            let oldAvg = currentUser.holdings?.[`${sym}_avg`] || prices[sym];
            let newAvg = ((oldHold * oldAvg) + (qty * prices[sym])) / (oldHold + qty);
            
            currentUser.balance -= total;
            if (!currentUser.holdings) currentUser.holdings = {};
            currentUser.holdings[sym] = (currentUser.holdings[sym] || 0) + qty;
            currentUser.holdings[`${sym}_avg`] = newAvg;
            currentUser.monthlyVolume = (currentUser.monthlyVolume || 0) + dollarAmount;
            
            addLog(`✅ خرید ${qty.toFixed(6)} ${sym} با ${dollarAmount}$ (کارمزد ${fee.toFixed(2)}$)`, true);

            renderMarket();
            renderAssets();

            let hold = currentUser.holdings?.[sym] || 0;
            if (coinQty <= 0 || hold < coinQty) { addLog("موجودی کافی نیست", false); return; }
            
            let avgPrice = currentUser.holdings[`${sym}_avg`] || prices[sym];
            let revenue = coinQty * prices[sym];
            let profitLoss = revenue - (coinQty * avgPrice);
            let feeRate = getUserFeeRate(currentUser);
            let fee = revenue * (feeRate / 100);
            let net = revenue - fee;
            
            currentUser.balance += net;
            currentUser.holdings[sym] -= coinQty;
            if (currentUser.holdings[sym] < 1e-9) {
                delete currentUser.holdings[sym];
                delete currentUser.holdings[`${sym}_avg`];
            }
            currentUser.monthlyVolume = (currentUser.monthlyVolume || 0) + revenue;
            
            addLog(`🔻 فروش ${coinQty.toFixed(6)} ${sym} | سود/زیان: ${profitLoss >= 0 ? '+' : ''}${(profitLoss - fee).toFixed(2)}$`, profitLoss - fee >= 0);

            renderMarket();

            checkTasks();

            let feeRate = getUserFeeRate(currentUser);
            let fee = amount * (feeRate / 100);
            let total = amount + fee;
            if (currentUser.balance < total) return;
            currentUser.balance -= total;
            if (!currentUser.leveragePositions) currentUser.leveragePositions = [];
            currentUser.leveragePositions.push({ id: Date.now(), type, sym, amount, lev, entryPrice: prices[sym], openTime: Date.now() });
            addLog(`⚡ پوزیشن ${type === "long" ? "لانگ" : "شورت"} ${sym} با اهرم ${lev}x باز شد`, true);
            saveCurrentUser();
            renderLeverage();
        }

        function closeLeverage(pos) {
            let currentPrice = prices[pos.sym];
            let profitPercent = pos.type === "long" ? (currentPrice - pos.entryPrice) / pos.entryPrice : (pos.entryPrice - currentPrice) / pos.entryPrice;
            let profit = profitPercent * pos.amount * pos.lev;
            let feeRate = getUserFeeRate(currentUser);
            let fee = Math.abs(profit) * (feeRate / 100);
            let netProfit = profit - fee;
            currentUser.balance += pos.amount + netProfit;
            currentUser.leveragePositions = currentUser.leveragePositions.filter(p => p.id !== pos.id);
            addLog(`🔒 بستن ${pos.sym} ${pos.type === "long" ? "لانگ" : "شورت"} | سود: ${netProfit >= 0 ? '+' : ''}${netProfit.toFixed(2)}$`, netProfit >= 0);
            saveCurrentUser();
            renderLeverage();
        }

        // ==================== سیستم تسک‌های روزانه ====================
        function generateDailyTasks() {
            const taskCount = 10;
            const newTasks = [];
            for (let i = 0; i < taskCount; i++) {
                const difficulty = Math.random();
                let requiredVolume, reward;
                if (difficulty < 0.33) {
                    requiredVolume = Math.floor(100 + Math.random() * 900);
                    reward = Math.floor(100 + Math.random() * 150);
                } else if (difficulty < 0.66) {
                    requiredVolume = Math.floor(1000 + Math.random() * 4000);
                    reward = Math.floor(150 + Math.random() * 200);
                } else {
                    requiredVolume = Math.floor(5000 + Math.random() * 15000);
                    reward = Math.floor(300 + Math.random() * 200);
                }
                newTasks.push({
                    id: "task_" + Date.now() + "_" + i + "_" + Math.random(),
                    name: "حجم معاملات " + requiredVolume.toLocaleString() + " دلار",
                    requiredVolume: requiredVolume,
                    reward: Math.min(500, Math.max(100, reward))
                });
            }
            globalSettings.customTasks = newTasks;
            saveSettings();
            if (currentUser) {
                if (!currentUser.completedTasks) currentUser.completedTasks = {};
                for (let task of globalSettings.customTasks) {
                    if (!currentUser.completedTasks[task.id]) {
                        currentUser.completedTasks[task.id] = false;
                    }
                }
                saveCurrentUser();
                renderTasks();
            }
        }

        function resetDailyTasks() {
            const today = new Date().toDateString();
            if (currentUser && currentUser.lastTaskReset !== today) {
                generateDailyTasks();
                if (currentUser.completedTasks) {
                    for (let task of globalSettings.customTasks) {
                        if (currentUser.completedTasks[task.id] === true) {
                            currentUser.completedTasks[task.id] = false;
                        }
                    }
                }
                currentUser.lastTaskReset = today;
                saveCurrentUser();
                renderTasks();
                addLog("📋 تسک‌های روزانه جدید اضافه شدند!", true);
            }
        }

        function checkTasks() {
            if (!currentUser.completedTasks) currentUser.completedTasks = {};
            let volume = currentUser.monthlyVolume || 0;
            for (let task of globalSettings.customTasks) {
                if (!currentUser.completedTasks[task.id] && volume >= task.requiredVolume) {
                    currentUser.balance += task.reward;
                    currentUser.completedTasks[task.id] = true;
                    addLog(`🎁 پاداش تسک "${task.name}": +${task.reward}$`, true);
                    saveCurrentUser();
                }
            }
            updateTopStats();
            renderTasks();
        }

        function claimDaily() {
            let today = new Date().toDateString();
            if (currentUser.lastDaily === today) { addLog("امروز پاداش روزانه گرفته‌اید!", false); return; }
            currentUser.balance += dailyRewardAmount;
            currentUser.lastDaily = today;
            addLog(`🎁 پاداش روزانه ${dailyRewardAmount}$ دریافت شد!`, true);
            saveCurrentUser();
            renderTasks();
        }

        // ==================== سیستم صندوق‌های جداگانه ====================
        function initUserFunds() {
            if (!currentUser.funds) {
                currentUser.funds = {
                    normal: { amount: 0, upgradeLevel: 0, interest: 2, type: "normal" },
                    gold: { amount: 0, active: false, expiry: null, interest: 5.5, type: "gold" },
                    legend: { amount: 0, active: false, expiry: null, interest: 7, type: "legend" },
                    highVolume: { amount: 0, active: false, expiry: null, interest: 10, type: "highVolume", requiredTrades: 600000, price: 100000 }
                };
            }
            if (!currentUser.funds.normal) currentUser.funds.normal = { amount: 0, upgradeLevel: 0, interest: 2, type: "normal" };
            if (!currentUser.funds.gold) currentUser.funds.gold = { amount: 0, active: false, expiry: null, interest: 5.5, type: "gold" };
            if (!currentUser.funds.legend) currentUser.funds.legend = { amount: 0, active: false, expiry: null, interest: 7, type: "legend" };
            if (!currentUser.funds.highVolume) currentUser.funds.highVolume = { amount: 0, active: false, expiry: null, interest: 10, type: "highVolume", requiredTrades: 600000, price: 100000 };
        }

        function getFundInterestRate(fundType) {
            if (!currentUser.funds) initUserFunds();
            switch(fundType) {
                case "gold": return currentUser.funds.gold.active ? 5.5 : 0;
                case "legend": return currentUser.funds.legend.active ? 7 : 0;
                case "highVolume": return currentUser.funds.highVolume.active ? 10 : 0;
                default: return 2 + (currentUser.funds.normal.upgradeLevel || 0) * 0.1;
            }
        }

        function depositToFund(fundType, amount) {
            if (amount > currentUser.balance) { addLog("موجودی کافی نیست", false); return; }
            if (!currentUser.funds) initUserFunds();
            
            let fund = currentUser.funds[fundType];
            if (!fund) { addLog("صندوق مورد نظر یافت نشد", false); return; }
            
            if (fundType === "gold" && !fund.active) { addLog("صندوق طلایی فعال نیست! ابتدا آن را فعال کنید.", false); return; }
            if (fundType === "legend" && !fund.active) { addLog("صندوق لجندری فعال نیست! ابتدا آن را فعال کنید.", false); return; }
            if (fundType === "highVolume" && !fund.active) { addLog("صندوق ویژه معاملات فعال نیست! ابتدا آن را فعال کنید.", false); return; }
            
            currentUser.balance -= amount;
            fund.amount += amount;
            saveCurrentUser();
            addLog(`🏦 واریز ${amount}$ به صندوق ${getFundName(fundType)}`, true);
            renderFundPanel();
        }

        function withdrawFromFund(fundType, amount) {
            if (!currentUser.funds) initUserFunds();
            let fund = currentUser.funds[fundType];
            if (!fund) { addLog("صندوق مورد نظر یافت نشد", false); return; }
            if (amount > fund.amount) { addLog("موجودی صندوق کافی نیست", false); return; }
            
            fund.amount -= amount;
            currentUser.balance += amount;
            saveCurrentUser();
            addLog(`🏦 برداشت ${amount}$ از صندوق ${getFundName(fundType)}`, true);
            renderFundPanel();
        }

        function getFundName(fundType) {
            switch(fundType) {
                case "normal": return "معمولی";
                case "gold": return "طلایی";
                case "legend": return "لجندری";
                case "highVolume": return "ویژه معاملات";
                default: return fundType;
            }
        }

            if (currentUser.balance < 10000) { addLog("موجودی کافی برای فعال‌سازی صندوق طلایی (10,000 دلار) ندارید!", false); return; }
            
            currentUser.balance -= 10000;

        function upgradeNormalFund() {
            if (!currentUser.funds) initUserFunds();
            if (!currentUser.isPro || (currentUser.proExpiry && new Date(currentUser.proExpiry) <= new Date())) {
                addLog("ارتقا صندوق معمولی فقط برای کاربران پرو امکان‌پذیر است!", false);
                return;
            }
            if (currentUser.funds.normal.upgradeLevel >= 40) {
                addLog("صندوق معمولی شما به حداکثر سطح ارتقا رسیده است! (حداکثر سود 6%)", false);
                return;
            }
            if (currentUser.balance < 100000) { addLog("موجودی کافی برای ارتقا (100,000 دلار) ندارید!", false); return; }
            
            currentUser.balance -= 100000;
            currentUser.funds.normal.upgradeLevel++;
            currentUser.funds.normal.interest = Math.min(6, 2 + currentUser.funds.normal.upgradeLevel * 0.1);
            saveCurrentUser();
            addLog(`🔧 صندوق معمولی شما به سطح ${currentUser.funds.normal.upgradeLevel} ارتقا یافت! سود فعلی: ${currentUser.funds.normal.interest}%`, true);
            renderFundPanel();
        }

        function checkFundExpiries() {
            if (!currentUser.funds) initUserFunds();
            let now = new Date();
            
            if (currentUser.funds.gold.active && currentUser.funds.gold.expiry && new Date(currentUser.funds.gold.expiry) <= now) {
                currentUser.funds.gold.active = false;
                currentUser.funds.gold.expiry = null;
                addLog("⏰ زمان فعال‌سازی صندوق طلایی به پایان رسید!", false);
            }
            if (currentUser.funds.legend.active && currentUser.funds.legend.expiry && new Date(currentUser.funds.legend.expiry) <= now) {
                currentUser.funds.legend.active = false;
                currentUser.funds.legend.expiry = null;
                addLog("⏰ زمان فعال‌سازی صندوق لجندری به پایان رسید!", false);
            }
            if (currentUser.funds.highVolume.active && currentUser.funds.highVolume.expiry && new Date(currentUser.funds.highVolume.expiry) <= now) {
                currentUser.funds.highVolume.active = false;
                currentUser.funds.highVolume.expiry = null;
                addLog("⏰ زمان فعال‌سازی صندوق ویژه معاملات به پایان رسید!", false);
            }
            saveCurrentUser();
        }

        function applyFundInterests() {
            if (!currentUser.funds) initUserFunds();
            let totalInterest = 0;
            
            if (currentUser.funds.normal.amount > 0) {
                let interest = currentUser.funds.normal.amount * (currentUser.funds.normal.interest / 100);
                currentUser.funds.normal.amount += interest;
                totalInterest += interest;
                addLog(`🏦 سود صندوق معمولی: +${interest.toFixed(2)}$ (${currentUser.funds.normal.interest}%)`, true);
            }
            if (currentUser.funds.gold.active && currentUser.funds.gold.amount > 0) {
                let interest = currentUser.funds.gold.amount * (5.5 / 100);
                currentUser.funds.gold.amount += interest;
                totalInterest += interest;
                addLog(`✨ سود صندوق طلایی: +${interest.toFixed(2)}$ (5.5%)`, true);
            }
            if (currentUser.funds.legend.active && currentUser.funds.legend.amount > 0) {
                let interest = currentUser.funds.legend.amount * (7 / 100);
                currentUser.funds.legend.amount += interest;
                totalInterest += interest;
                addLog(`👑 سود صندوق لجندری: +${interest.toFixed(2)}$ (7%)`, true);
            }
            if (currentUser.funds.highVolume.active && currentUser.funds.highVolume.amount > 0) {
                let interest = currentUser.funds.highVolume.amount * (10 / 100);
                currentUser.funds.highVolume.amount += interest;
                totalInterest += interest;
                addLog(`📊 سود صندوق ویژه معاملات: +${interest.toFixed(2)}$ (10%)`, true);
            }
            
            if (totalInterest > 0) {
                currentUser.balance += totalInterest;
                saveCurrentUser();
                renderFundPanel();
                updateTopStats();
            }
        }

        function buyProPlan(planId) {
            let plan = proPlans[planId];
            if (!plan || !plan.enabled) {
                addLog("این پلن پرو در حال حاضر غیرفعال است", false);
                return;
            }
            let price = plan.price;
            if (currentUser.balance < price) {
                addLog(`موجودی کافی نیست! نیاز به ${price}$ دارید`, false);
                return;
            }
            currentUser.balance -= price;
            let expiryDate = new Date();
            if (plan.durationType === "day") {
                expiryDate.setDate(expiryDate.getDate() + plan.duration);
            } else if (plan.durationType === "month") {
                expiryDate.setMonth(expiryDate.getMonth() + plan.duration);
            } else if (plan.durationType === "year") {
                expiryDate.setFullYear(expiryDate.getFullYear() + plan.duration);
            }
            currentUser.isPro = true;
            currentUser.proPlan = plan.name;
            currentUser.proExpiry = expiryDate.toISOString();
            saveCurrentUser();
            addLog(`✨ تبریک! شما حساب پرو (${plan.name}) را فعال کردید! ✨`, true);
            sendToDiscord(`🌟 کاربر ${currentUser.name} حساب پرو ${plan.name} را فعال کرد! مبلغ: ${price}$`);
            renderSettings();
            renderProPlans();
            updateTopStats();
        }

                    return;

                if (amount > currentUser.balance) {
                    document.getElementById("diceBetResult").className = "bet-result lose";

                document.getElementById("diceResult").classList.add("spinning");

                        let win = false;
                        let multiplier = 0;
                        let profit = 0;
                        let resultText = "";
                        
                        if (selectedDiceBet === "even" && diceResult % 2 === 0) {
                            win = true;
                            multiplier = 1.5;

                            win = true;
                            multiplier = 1.5;

                            win = true;
                            multiplier = 3;
                        }
                        
                        if (win) {
                            profit = amount * multiplier;
                            currentUser.balance += profit - amount;

                            clearTimeout(slotSumTimeout);

                        // مخفی کردن بعد از 10 ثانیه

                            resultClass = "win";
                            betHistory.push({ type: `ماشین شانس (${slot1}${slot2}${slot3}=${sum})`, amount: amount, profit: profit - amount, result: "win", time: new Date().toLocaleTimeString("fa-IR") });
                            addLog(`🎰 برد ماشین شانس! ${slot1}${slot2}${slot3} جمع=${sum} - سود: +${(profit - amount).toFixed(2)}$`, true);

                            currentUser.balance += profit - amount;
                            resultText = `🎉 برد! ${slot1}${slot2}${slot3} جمع ${sum} - ضریب 2.5x! سود: +${(profit - amount).toFixed(2)}$`;
                            resultClass = "win";
                            betHistory.push({ type: `ماشین شانس (${slot1}${slot2}${slot3}=${sum})`, amount: amount, profit: profit - amount, result: "win", time: new Date().toLocaleTimeString("fa-IR") });
                            addLog(`🎰 برد ماشین شانس! ${slot1}${slot2}${slot3} جمع=${sum} - سود: +${(profit - amount).toFixed(2)}$`, true);
                        } else if (sum === 14) {

                            resultClass = "win";
                            betHistory.push({ type: `ماشین شانس (${slot1}${slot2}${slot3}=${sum})`, amount: amount, profit: profit - amount, result: "win", time: new Date().toLocaleTimeString("fa-IR") });
                            addLog(`🎰 برد ماشین شانس! ${slot1}${slot2}${slot3} جمع=${sum} - سود: +${(profit - amount).toFixed(2)}$`, true);
                        } else if (sum === 13) {

                            localStorage.setItem("arena_pro_plans", JSON.stringify(proPlans));
                            renderAdminPanel();
                            renderProPlans();
                            addLog(`پلن پرو حذف شد`, true);
                        }
                    };
                });
            }
            
            document.getElementById("addPlanBtn")?.addEventListener("click", () => {
                let name = document.getElementById("newPlanName").value.trim();
                let duration = parseFloat(document.getElementById("newPlanDuration").value);
                let durationType = document.getElementById("newPlanDurationType").value;
                let price = parseFloat(document.getElementById("newPlanPrice").value);
                if(!name){ alert("لطفاً نام پلن را وارد کنید"); return; }
                if(isNaN(duration) || duration <= 0){ alert("لطفاً مدت معتبر وارد کنید"); return; }
                if(isNaN(price) || price <= 0){ alert("لطفاً قیمت معتبر وارد کنید"); return; }
                let newId = "custom_" + Date.now();
                proPlans[newId] = { name: name, duration: duration, durationType: durationType, price: price, enabled: true };
                localStorage.setItem("arena_pro_plans", JSON.stringify(proPlans));
                renderAdminPanel();
                renderProPlans();
                addLog(`✅ پلن پرو جدید "${name}" با قیمت ${price}$ اضافه شد`, true);
                document.getElementById("newPlanName").value = "";
                document.getElementById("newPlanDuration").value = "";
                document.getElementById("newPlanPrice").value = "";
            });
            
            let tasksDiv = document.getElementById("tasksAdminList");
            if(tasksDiv){
                if(globalSettings.customTasks.length === 0){
                    tasksDiv.innerHTML = "<div class='holding-text'>تسکی وجود ندارد. روی دکمه تنظیم مجدد کلیک کنید.</div>";
                } else {
                    tasksDiv.innerHTML = "";
                    for(let i = 0; i < globalSettings.customTasks.length; i++){
                        let t = globalSettings.customTasks[i];
                        tasksDiv.innerHTML += `
                            <div class="task-item">
                                <div style="flex:2"><strong>${t.name}</strong><div><span class="task-badge">${t.requiredVolume.toLocaleString()} دلار حجم</span></div></div>
                                <div style="flex:1">🎁 پاداش: ${t.reward.toLocaleString()}$</div>
                            </div>
                        `;
                    }
                }
            }
            
            let iconData = null;
            document.getElementById("newIcon")?.addEventListener("change", (e) => { let f = e.target.files[0]; if(f){ let r = new FileReader(); r.onload = (ev) => { iconData = ev.target.result; }; r.readAsDataURL(f); } });
            
            document.getElementById("addCoinBtn")?.addEventListener("click", () => {
                let sym = document.getElementById("newSym").value.trim().toUpperCase();
                let name = document.getElementById("newName").value.trim();
                let price = parseFloat(document.getElementById("newPrice").value);
                let vol = parseFloat(document.getElementById("newVol").value);
                if(!sym){ alert("لطفاً نماد ارز را وارد کنید"); return; }
                if(!name){ alert("لطفاً نام فارسی ارز را وارد کنید"); return; }
                if(isNaN(price) || price <= 0){ alert("لطفاً قیمت اولیه معتبر وارد کنید"); return; }
                if(customCoins.find(c=>c.symbol===sym) || mainCoins.includes(sym)){ document.getElementById("coinMsg").innerHTML = `<span style="color:#ef4444">❌ این نماد قبلاً وجود دارد!</span>`; setTimeout(()=> document.getElementById("coinMsg").innerHTML = "", 2000); return; }
                customCoins.push({ symbol: sym, name: name, price: price, volatility: isNaN(vol) ? 8 : vol, iconData: iconData });
                globalSettings.customCoins = customCoins;
                prices[sym] = price;
                initialPrices[sym] = price;
                saveSettings();
                document.getElementById("coinMsg").innerHTML = `<span style="color:#10b981">✅ ارز ${sym} (${name}) با موفقیت اضافه شد!</span>`;
                setTimeout(()=> document.getElementById("coinMsg").innerHTML = "", 3000);
                document.getElementById("newSym").value = ""; document.getElementById("newName").value = ""; document.getElementById("newPrice").value = "10"; document.getElementById("newVol").value = "8";
                if(document.getElementById("newIcon")) document.getElementById("newIcon").value = "";
                iconData = null;
                renderAdminPanel();
                renderMarket();
                addLog(`➕ ارز جدید ${sym} (${name}) با قیمت ${price}$ به بازار اضافه شد`, true);
            });
            
            let customDiv = document.getElementById("customCoinsList");
            if(customDiv){
                if(customCoins.length === 0){
                    customDiv.innerHTML = "<div class='holding-text'>هیچ ارز سفارشی اضافه نشده است</div>";
                } else {
                    customDiv.innerHTML = customCoins.map((c,idx) => `
                        <div class="custom-coin-item">
                            <div><strong>${c.symbol}</strong> - ${c.name}<br>💰 قیمت: ${c.price}$ | 📊 نوسان: ${c.volatility || 8}%</div>
                            <div>
                                <button data-editidx="${idx}" data-field="price" class="max-btn btn-small">✏️ قیمت</button>
                                <button data-editidx="${idx}" data-field="vol" class="max-btn btn-small">📊 نوسان</button>
                                <button data-delidx="${idx}" class="max-btn btn-small" style="background:#ef4444;color:white">🗑️ حذف</button>
                            </div>
                        </div>
                    `).join("");
                }
                
                document.querySelectorAll("[data-delidx]").forEach(btn => { 
                    btn.onclick = () => { 
                        let idx = parseInt(btn.dataset.delidx); 
                        let sym = customCoins[idx].symbol;
                        if(confirm(`آیا از حذف ارز ${sym} مطمئن هستید؟`)){
                            customCoins.splice(idx,1); 
                            globalSettings.customCoins = customCoins; 
                            delete prices[sym]; 
                            delete initialPrices[sym]; 
                            saveSettings(); 
                            renderAdminPanel(); 
                            renderMarket();
                            addLog(`🗑️ ارز ${sym} از بازار حذف شد`, false);
                        }
                    }; 
                });
                
                document.querySelectorAll("[data-editidx]").forEach(btn => { 
                    btn.onclick = () => { 
                        let idx = parseInt(btn.dataset.editidx); 
                        let field = btn.dataset.field; 
                        let newVal = prompt("مقدار جدید را وارد کنید:"); 
                        if(newVal && !isNaN(parseFloat(newVal))){ 
                            if(field==="price"){ 
                                customCoins[idx].price = parseFloat(newVal); 
                                prices[customCoins[idx].symbol] = parseFloat(newVal); 
                                initialPrices[customCoins[idx].symbol] = parseFloat(newVal); 
                                addLog(`💰 قیمت ارز ${customCoins[idx].symbol} به ${newVal}$ تغییر کرد`, true);
                            } else if(field==="vol"){ 
                                customCoins[idx].volatility = parseFloat(newVal); 
                                addLog(`📊 نوسان ارز ${customCoins[idx].symbol} به ${newVal}% تغییر کرد`, true);
                            } 
                            globalSettings.customCoins = customCoins; 
                            saveSettings(); 
                            renderAdminPanel(); 
                            renderMarket(); 
                        } 
                    }; 
                });
            }
        }

        function saveSettings() { localStorage.setItem("arena_settings", JSON.stringify(globalSettings)); }
        function saveUsers() { localStorage.setItem("arena_users", JSON.stringify(users)); }

        if (!users.find(u => u.role === "admin")) {
            users.push({ id: Date.now(), name: "ادمین", email: "admin@arena.com", phone: "09123456789", password: "admin123", role: "admin", balance: 1000000, holdings: { USDT: 100000 }, monthlyVolume: 0, refCode: "ADMIN123", referredBy: null, referrals: [], completedTasks: {}, fundAmount: 0, leveragePositions: [], lastDaily: null, isPro: true, proPlan: "ادمین", proExpiry: new Date(Date.now() + 365 * 24 * 60 * 60 * 1000).toISOString(), funds: { normal: { amount: 0, upgradeLevel: 0, interest: 2 }, gold: { amount: 0, active: false, expiry: null }, legend: { amount: 0, active: false, expiry: null }, highVolume: { amount: 0, active: false, expiry: null } } });
            saveUsers();
        }

        // ========== مدیریت فرم‌های لاگین ==========
        document.getElementById("showRegisterBtn").onclick = () => { document.getElementById("loginForm").classList.add("form-hidden"); document.getElementById("registerForm").classList.remove("form-hidden"); document.getElementById("forgotForm").classList.add("form-hidden"); };
        document.getElementById("showLoginBtn").onclick = () => { document.getElementById("loginForm").classList.remove("form-hidden"); document.getElementById("registerForm").classList.add("form-hidden"); document.getElementById("forgotForm").classList.add("form-hidden"); };
        document.getElementById("forgotBtn").onclick = () => { document.getElementById("loginForm").classList.add("form-hidden"); document.getElementById("registerForm").classList.add("form-hidden"); document.getElementById("forgotForm").classList.remove("form-hidden"); };
        document.getElementById("backToLoginBtn").onclick = () => { document.getElementById("loginForm").classList.remove("form-hidden"); document.getElementById("registerForm").classList.add("form-hidden"); document.getElementById("forgotForm").classList.add("form-hidden"); };
        
        document.getElementById("doRegisterBtn").onclick = () => {
            let name = document.getElementById("regName").value.trim();
            let username = document.getElementById("regUsername").value.trim();
            let phone = document.getElementById("regPhone").value.trim();
            let email = document.getElementById("regEmail").value.trim();
            let pass = document.getElementById("regPassword").value;
            let confirm = document.getElementById("regConfirmPassword").value;
            let refCode = document.getElementById("regReferralCode").value.trim().toUpperCase();
            let err = document.getElementById("registerError");
            if(!name || !username || !phone || !email || !pass){ err.innerText = "همه فیلدها را پر کنید"; return; }
            if(pass.length < 6){ err.innerText = "رمز حداقل ۶ کاراکتر"; return; }
            if(pass !== confirm){ err.innerText = "رمز مطابقت ندارد"; return; }
            
            if(users.find(u=>u.email===email || u.username===username)){ 
                err.innerText = "این ایمیل یا نام کاربری قبلاً ثبت شده است!"; 
                return; 
            }
            
            let referrer = null;
            if(refCode) referrer = users.find(u=>u.refCode===refCode);
            let newRefCode = Math.random().toString(36).substring(2,8).toUpperCase();
            let newUser = { 
                id: Date.now(), 
                name: name, 
                username: username,
                email: email, 
                phone: phone, 
                password: pass, 
                role: "user", 
                balance: defaultNewUserBalance, 
                holdings: { USDT: 5000 }, 
                monthlyVolume: 0, 
                refCode: newRefCode, 
                referredBy: referrer?.id || null, 
                referrals: [], 
                completedTasks: {}, 
                fundAmount: 0, 
                leveragePositions: [], 
                lastDaily: null, 
                isPro: false, 
                proPlan: null, 
                proExpiry: null, 
                funds: { normal: { amount: 0, upgradeLevel: 0, interest: 2 }, gold: { amount: 0, active: false, expiry: null }, legend: { amount: 0, active: false, expiry: null }, highVolume: { amount: 0, active: false, expiry: null } } 
            };
            users.push(newUser);
            if(referrer){ 
                let rewardAmount = (referrer.isPro && referrer.proExpiry && new Date(referrer.proExpiry) > new Date()) ? referralRewardPro : referralReward;
                referrer.balance += rewardAmount; 
                referrer.referrals = referrer.referrals || []; 
                referrer.referrals.push(newUser.id); 
                saveUsers(); 
                addLog(`🎁 کاربر ${referrer.name} به دلیل دعوت دوست جدید ${rewardAmount}$ دریافت کرد!`, true);
            }
            saveUsers();
            
            let discordMsg = `🆕 **کاربر جدید ثبت نام کرد!**\n👤 نام: ${name}\n👤 نام کاربری: ${username}\n📧 ایمیل: ${email}\n📱 شماره: ${phone}\n💰 موجودی اولیه: ${defaultNewUserBalance.toLocaleString()} دلار\n🎁 کد دعوت: ${refCode || "ندارد"}${referrer ? `\n👥 معرف: ${referrer.name}` : ""}\n🕒 زمان: ${new Date().toLocaleString("fa-IR")}`;
            sendToDiscord(discordMsg);
            
            err.style.color = "#10b981"; err.innerText = `✅ ثبت نام موفق! اکنون وارد شوید`;
            setTimeout(()=>{ document.getElementById("showLoginBtn").click(); err.innerText=""; }, 2000);
        };
        
        document.getElementById("doLoginBtn").onclick = () => {
            let id = document.getElementById("loginIdentifier").value.trim();
            let pass = document.getElementById("loginPassword").value;
            let user = users.find(u=> (u.email===id || u.username===id || u.phone===id) && u.password===pass);
            if(!user){ document.getElementById("loginError").innerText = "اطلاعات نادرست"; return; }
            currentUser = user;
            localStorage.setItem("arena_current_user", JSON.stringify(user));
            document.getElementById("loginPage").style.display = "none";
            document.getElementById("gamePage").style.display = "block";
            startGame();
        };
        
        document.getElementById("doForgotBtn").onclick = () => {
            let email = document.getElementById("forgotEmail").value.trim();
            let phone = document.getElementById("forgotPhone").value.trim();
            let user = users.find(u=>u.email===email && u.phone===phone);
            if(user) document.getElementById("forgotResult").innerHTML = `<span style="color:#10b981">رمز عبور: ${user.password}</span>`;
            else document.getElementById("forgotResult").innerHTML = `<span style="color:#ef4444">اطلاعات مطابقت ندارد</span>`;
        };

        function startGame() {
            initPrices();
            if(priceUpdateInterval) clearInterval(priceUpdateInterval);
            priceUpdateInterval = setInterval(updatePrices, 3000);
            
            if(dailyTasksResetInterval) clearInterval(dailyTasksResetInterval);
            dailyTasksResetInterval = setInterval(() => resetDailyTasks(), 24 * 60 * 60 * 1000);
            
            if(!currentUser.holdings) currentUser.holdings = { USDT: 5000 };
            if(!currentUser.completedTasks) currentUser.completedTasks = {};
            if(!currentUser.leveragePositions) currentUser.leveragePositions = [];
            if(!currentUser.funds) initUserFunds();
            if(currentUser.monthlyVolume === undefined) currentUser.monthlyVolume = 0;
            if(currentUser.isPro === undefined) currentUser.isPro = false;
            
            resetDailyTasks();
            checkFundExpiries();
            
            document.getElementById("appRoot").innerHTML = `
                <div class="admin-header ${currentUser.isPro && currentUser.proExpiry && new Date(currentUser.proExpiry) > new Date() ? 'pro-account' : ''}">
                    <div class="user-title">آرنا تریدر | ${currentUser.role === "admin" ? "ادمین" : currentUser.name} ${currentUser.isPro && currentUser.proExpiry && new Date(currentUser.proExpiry) > new Date() ? '<span class="pro-badge">⭐ پرو</span>' : ''}</div>
                    <div class="ref-box">🎁 کد دعوت: <span id="myRefCodeSpan">${currentUser.refCode}</span></div>
                    <button class="logout-btn" id="logoutBtn">خروج</button>
                </div>
                <div class="nav-tabs">
                    <button class="nav-btn active" data-tab="market">بازار</button>
                    <button class="nav-btn" data-tab="leverage">اهرم</button>
                    <button class="nav-btn" data-tab="fund">صندوق</button>
                    <button class="nav-btn" data-tab="tasks">تسک‌ها</button>
                    <button class="nav-btn" data-tab="pro">⭐ حساب پرو</button>
                    <button class="nav-btn" data-tab="assets">دارایی‌ها</button>
                    <button class="nav-btn" data-tab="referral">دعوت</button>
                    <button class="nav-btn" data-tab="betting">🎲 شرط‌بندی</button>
                    <button class="nav-btn" data-tab="settings">تنظیمات</button>
                    ${currentUser.role === "admin" ? '<button class="nav-btn" data-tab="admin">👑 مدیریت</button>' : ''}
                    ${currentUser.role === "admin" ? '<button class="nav-btn" data-tab="usersinfo">📋 اطلاعات کاربران</button>' : ''}
                </div>
                <div class="stats-row">
                    <div class="stat-card"><div class="stat-label">کارمزد</div><div class="stat-value" id="statFee">0%</div></div>
                    <div class="stat-card"><div class="stat-label">حجم ماهانه</div><div class="stat-value" id="statMonthly">0</div></div>
                    <div class="stat-card"><div class="stat-label">سود/زیان</div><div class="stat-value" id="statProfit">0</div></div>
                    <div class="stat-card"><div class="stat-label">موجودی</div><div class="stat-value" id="statBalance">0</div><div class="stat-label">پورتفو: <span id="statPortfolio">0</span></div></div>
                </div>
                <div id="marketPane" class="tab-pane active"><input type="text" id="searchInput" class="search-box" placeholder="جستجو..."><div id="marketGrid" class="assets-grid"></div></div>
                <div id="leveragePane" class="tab-pane"><div class="panel-card"><select id="levCoin">${getAllAssets().filter(s=>s!=="USDT").slice(0,30).map(s=>`<option>${s}</option>`).join("")}</select><select id="levMult"><option>1</option><option>2</option><option>5</option><option>10</option><option>20</option><option>50</option><option>100</option></select><input id="levAmount" class="amount-input" value="100"><button class="btn-buy" id="levLong">لانگ</button><button class="btn-sell" id="levShort">شورت</button><div id="leverageList" class="holding-text" style="margin-top:15px"></div></div></div>
                <div id="fundPane" class="tab-pane"><div id="fundPanel"></div></div>
                <div id="tasksPane" class="tab-pane"><div id="tasksContainer"></div></div>
                <div id="proPane" class="tab-pane"><div id="proPlansPanel"></div></div>
                <div id="assetsPane" class="tab-pane"><div class="panel-card"><div id="assetsList"></div></div></div>
                <div id="referralPane" class="tab-pane"><div class="panel-card"><h3>سیستم دعوت</h3><p>کد شما: <strong style="font-size:1.3rem">${currentUser.refCode}</strong></p><p>پاداش هر دعوت: ${(currentUser.isPro && currentUser.proExpiry && new Date(currentUser.proExpiry) > new Date()) ? referralRewardPro : referralReward}$</p><p>تعداد دعوت: ${currentUser.referrals?.length || 0}</p><button class="max-btn" id="copyRef">📋 کپی کد</button></div></div>
                <div id="bettingPane" class="tab-pane"><div id="bettingPanel"></div></div>
                <div id="settingsPane" class="tab-pane"><div id="settingsPanel"></div></div>
                <div id="adminPane" class="tab-pane"><div id="adminPanel"></div></div>
                ${currentUser.role === "admin" ? '<div id="usersinfoPane" class="tab-pane"><div id="usersInfoPanel"></div></div>' : ''}
                <div class="log-panel"><div class="log-scroll" id="logScroll"></div></div>
                <footer>⚡ اهرم تا ${getUserMaxLeverage(currentUser)}x | کارمزد ${getUserFeeRate(currentUser)}% | ${currentUser.isPro && currentUser.proExpiry && new Date(currentUser.proExpiry) > new Date() ? '⭐ حساب پرو فعال ⭐' : 'حساب معمولی'}</footer>
            `;
            
            document.querySelectorAll(".nav-btn").forEach(btn => { 
                btn.onclick = () => { 
                    document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active")); 
                    btn.classList.add("active"); 
                    document.querySelectorAll(".tab-pane").forEach(p=>p.classList.remove("active")); 
                    document.getElementById(btn.dataset.tab+"Pane").classList.add("active"); 
                    if(btn.dataset.tab==="admin") renderAdminPanel(); 
                    if(btn.dataset.tab==="settings") renderSettings(); 
                    if(btn.dataset.tab==="assets") renderAssets(); 
                    if(btn.dataset.tab==="leverage") renderLeverage(); 
                    if(btn.dataset.tab==="usersinfo" && currentUser.role === "admin") renderUsersInfo(); 
                    if(btn.dataset.tab==="pro") renderProPlans(); 
                    if(btn.dataset.tab==="fund") renderFundPanel(); 
                    if(btn.dataset.tab==="betting") renderBetting(); 
                }; 
            });
            document.getElementById("logoutBtn").onclick = () => { localStorage.removeItem("arena_current_user"); location.reload(); };
            document.getElementById("copyRef")?.addEventListener("click", () => { navigator.clipboard.writeText(currentUser.refCode); addLog("کد دعوت کپی شد", true); });
            document.getElementById("levLong")?.addEventListener("click", () => { let sym = document.getElementById("levCoin").value; let amt = parseFloat(document.getElementById("levAmount").value); let lev = parseInt(document.getElementById("levMult").value); openLeverage("long", sym, amt, lev); });
            document.getElementById("levShort")?.addEventListener("click", () => { let sym = document.getElementById("levCoin").value; let amt = parseFloat(document.getElementById("levAmount").value); let lev = parseInt(document.getElementById("levMult").value); openLeverage("short", sym, amt, lev); });
            document.getElementById("searchInput")?.addEventListener("input", () => renderMarket());
            
            renderMarket(); renderAssets(); renderLeverage(); renderTasks(); renderSettings(); renderProPlans(); renderFundPanel(); renderBetting(); updateTopStats();
            if(currentUser.role === "admin") renderAdminPanel();
            if(currentUser.funds) renderFundPanel();
            
            setInterval(() => {
                if(currentUser){
                    applyFundInterests();
                }
            }, 60000);
        }
        
        let savedUser = localStorage.getItem("arena_current_user");
        if(savedUser){
            let user = JSON.parse(savedUser);
            if(users.find(u=>u.id===user.id)){
                currentUser = user;
                document.getElementById("loginPage").style.display = "none";
                document.getElementById("gamePage").style.display = "block";
                startGame();
            }
        }
        
        window.buyProPlan = buyProPlan;
        window.activateGoldFund = activateGoldFund;
        window.activateLegendFund = activateLegendFund;
        window.upgradeNormalFund = upgradeNormalFund;
        window.activateHighVolumeFund = activateHighVolumeFund;
    </script>
</body>
</html>
